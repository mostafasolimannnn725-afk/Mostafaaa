<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Recorder → Telegram</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a32;
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.12);
      --accent-glow: rgba(0, 229, 160, 0.35);
      --red: #ff4d6d;
      --red-dim: rgba(255, 77, 109, 0.12);
      --text: #e8e8f0;
      --muted: #6b6b7e;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Ambient background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 340px; height: 340px;
      background: rgba(0, 229, 160, 0.07);
      top: -80px; left: -80px;
    }
    body::after {
      width: 280px; height: 280px;
      background: rgba(255, 77, 109, 0.06);
      bottom: -60px; right: -60px;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 24px 64px rgba(0,0,0,0.5);
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-glow);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 18px; height: 18px; fill: var(--accent); }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
    }

    /* Waveform visualiser */
    .visualiser-wrap {
      background: #0a0a0d;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 28px;
      position: relative;
    }
    canvas#waveform {
      width: 100%;
      height: 100%;
      display: block;
    }
    .visualiser-label {
      position: absolute;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
    }

    /* Status pill */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 28px;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status-pill.recording {
      background: var(--red-dim);
      border-color: var(--red);
      color: var(--red);
    }
    .status-pill.sending {
      background: rgba(255, 180, 0, 0.1);
      border-color: rgba(255, 180, 0, 0.5);
      color: #ffb400;
    }
    .status-pill.done {
      background: var(--accent-dim);
      border-color: var(--accent-glow);
      color: var(--accent);
    }
    .status-pill.error {
      background: var(--red-dim);
      border-color: var(--red);
      color: var(--red);
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .dot.pulse { animation: pulse 1.1s ease-in-out infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }

    /* Buttons */
    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 14px 20px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.18s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

    #startBtn {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    #startBtn:hover:not(:disabled) {
      background: #00ffb3;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    #startBtn:disabled {
      background: rgba(0,229,160,0.2);
      color: rgba(0,0,0,0.4);
      cursor: not-allowed;
    }

    #stopBtn {
      background: var(--red-dim);
      color: var(--red);
      border-color: var(--red);
    }
    #stopBtn:hover:not(:disabled) {
      background: rgba(255,77,109,0.22);
      box-shadow: 0 0 20px rgba(255,77,109,0.25);
    }
    #stopBtn:disabled {
      background: rgba(255,77,109,0.05);
      color: rgba(255,77,109,0.3);
      border-color: rgba(255,77,109,0.15);
      cursor: not-allowed;
    }

    button svg { width: 15px; height: 15px; fill: currentColor; flex-shrink: 0; }

    /* Timer */
    .timer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.06em;
      height: 18px;
    }
    .timer span { color: var(--red); }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }

    .footer-note {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.03em;
      line-height: 1.6;
    }

    @media (max-width: 400px) {
      .card { padding: 36px 24px 32px; }
      .btn-group { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo-row">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
      </svg>
    </div>
    <h1>Voice → Telegram</h1>
  </div>

  <div class="visualiser-wrap">
    <canvas id="waveform"></canvas>
    <span class="visualiser-label" id="visualLabel">awaiting mic</span>
  </div>

  <div class="status-pill" id="statusPill">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">idle</span>
  </div>

  <div class="btn-group">
    <button id="startBtn">
      <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
      Start
    </button>
    <button id="stopBtn" disabled>
      <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
      Stop
    </button>
  </div>

  <div class="timer" id="timer"></div>

  <div class="divider"></div>
  <p class="footer-note">Audio is recorded in webm/opus and sent<br>directly to your configured Telegram bot.</p>
</div>

<script>
  const TELEGRAM_BOT_TOKEN = "8275206743:AAG-6sU3SfQDL_4SF0VO7jsFhQZ2f3rNLgg";
  const TELEGRAM_CHAT_ID = "2061226536";

  // ── DOM refs ──────────────────────────────────────────────
  const startBtn     = document.getElementById('startBtn');
  const stopBtn      = document.getElementById('stopBtn');
  const statusPill   = document.getElementById('statusPill');
  const statusText   = document.getElementById('statusText');
  const statusDot    = document.getElementById('statusDot');
  const timerEl      = document.getElementById('timer');
  const visualLabel  = document.getElementById('visualLabel');
  const canvas       = document.getElementById('waveform');
  const ctx          = canvas.getContext('2d');

  // ── State ─────────────────────────────────────────────────
  let mediaRecorder   = null;
  let audioChunks     = [];
  let stream          = null;
  let animFrameId     = null;
  let analyser        = null;
  let timerInterval   = null;
  let secondsElapsed  = 0;
  let isRecording     = false;

  // ── Helpers ───────────────────────────────────────────────
  function setStatus(state, message) {
    statusPill.className = 'status-pill ' + state;
    statusText.textContent = message;
    statusDot.className = 'dot' + (state === 'recording' || state === 'sending' ? ' pulse' : '');
  }

  function formatTime(s) {
    const m = String(Math.floor(s / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    return `${m}:${sec}`;
  }

  // ── Canvas resize ─────────────────────────────────────────
  function resizeCanvas() {
    canvas.width  = canvas.offsetWidth  * window.devicePixelRatio;
    canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // ── Idle flat-line draw ───────────────────────────────────
  function drawIdle() {
    resizeCanvas();
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(107,107,126,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, H / 2);
    ctx.lineTo(W, H / 2);
    ctx.stroke();
  }
  drawIdle();

  // ── Waveform animation ────────────────────────────────────
  function drawWaveform() {
    if (!analyser) return;
    animFrameId = requestAnimationFrame(drawWaveform);

    const bufferLength = analyser.fftSize;
    const dataArray    = new Uint8Array(bufferLength);
    analyser.getByteTimeDomainData(dataArray);

    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    const gradient = ctx.createLinearGradient(0, 0, W, 0);
    gradient.addColorStop(0,   'rgba(0,229,160,0.2)');
    gradient.addColorStop(0.5, 'rgba(0,229,160,1)');
    gradient.addColorStop(1,   'rgba(0,229,160,0.2)');

    ctx.lineWidth   = 2 * window.devicePixelRatio;
    ctx.strokeStyle = gradient;
    ctx.shadowColor = 'rgba(0,229,160,0.5)';
    ctx.shadowBlur  = 8;
    ctx.beginPath();

    const sliceWidth = W / bufferLength;
    let x = 0;

    for (let i = 0; i < bufferLength; i++) {
      const v = dataArray[i] / 128.0;
      const y = (v * H) / 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      x += sliceWidth;
    }
    ctx.lineTo(W, H / 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // ── Start recording ───────────────────────────────────────
  async function startRecording() {
    if (isRecording) return;

    try {
      setStatus('', 'requesting mic…');
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      const msg = err.name === 'NotAllowedError'
        ? 'mic permission denied'
        : 'mic unavailable';
      setStatus('error', msg);
      timerEl.innerHTML = '';
      return;
    }

    // Analyser for visualisation
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source   = audioCtx.createMediaStreamSource(stream);
    analyser        = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    source.connect(analyser);

    visualLabel.style.display = 'none';
    drawWaveform();

    // MediaRecorder
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : 'audio/webm';

    audioChunks  = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType });

    mediaRecorder.ondataavailable = e => {
      if (e.data && e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      stopVisualiser();
      await sendToTelegram();
    };

    mediaRecorder.start(250);
    isRecording = true;

    startBtn.disabled = true;
    stopBtn.disabled  = false;
    setStatus('recording', 'recording');

    // Timer
    secondsElapsed = 0;
    timerEl.innerHTML = `<span>${formatTime(0)}</span>`;
    timerInterval = setInterval(() => {
      secondsElapsed++;
      timerEl.innerHTML = `<span>${formatTime(secondsElapsed)}</span>`;
    }, 1000);
  }

  // ── Stop recording ────────────────────────────────────────
  function stopRecording() {
    if (!isRecording || !mediaRecorder) return;
    isRecording = false;

    clearInterval(timerInterval);
    timerEl.innerHTML = '';

    stopBtn.disabled = true;
    if (mediaRecorder.state !== 'inactive') mediaRecorder.stop();

    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
  }

  function stopVisualiser() {
    if (animFrameId) {
      cancelAnimationFrame(animFrameId);
      animFrameId = null;
    }
    analyser = null;
    visualLabel.style.display = '';
    visualLabel.textContent = 'awaiting mic';
    drawIdle();
  }

  // ── Send to Telegram ──────────────────────────────────────
  async function sendToTelegram() {
    setStatus('sending', 'sending…');

    const blob = new Blob(audioChunks, { type: 'audio/webm' });
    audioChunks = [];

    const formData = new FormData();
    formData.append('chat_id', TELEGRAM_CHAT_ID);
    formData.append('voice', blob, 'voice.webm');

    try {
      const response = await fetch(
        `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVoice`,
        { method: 'POST', body: formData }
      );

      const result = await response.json();

      if (response.ok && result.ok) {
        setStatus('done', 'sent ✓');
      } else {
        const errMsg = result.description || `HTTP ${response.status}`;
        setStatus('error', 'telegram: ' + errMsg.slice(0, 40));
      }
    } catch (err) {
      setStatus('error', 'network error');
    }

    startBtn.disabled = false;
  }

  // ── Event listeners ───────────────────────────────────────
  startBtn.addEventListener('click', startRecording);
  stopBtn.addEventListener('click', stopRecording);
</script>
</body>
</html>
